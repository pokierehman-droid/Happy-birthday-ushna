<!DOCTYPE html>
<html>
<head>
<title>Love Page</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: red;
  color: white;
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* Glow Text */
h1 {
  margin-top: 80px;
  font-size: 42px;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from {
    text-shadow: 0 0 10px white, 0 0 20px pink;
  }
  to {
    text-shadow: 0 0 20px yellow, 0 0 40px white;
  }
}

/* Premium text */
.premium {
  margin-top: 20px;
  font-size: 18px;
  font-style: italic;
}

/* Center image */
.center-img {
  margin-top: 30px;
  width: 240px;
  border-radius: 20px;
  box-shadow: 0px 0px 20px white;
}

/* Corner image */
.corner-img {
  position: absolute;
  top: 0;
  right: 0;
  width: 140px;
}

/* Confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  background: yellow;
  top: -10px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}

/* Next Button */
.next-btn {
  margin-top: 25px;
  padding: 12px 25px;
  font-size: 18px;
  background: black;
  color: white;
  border: none;
  border-radius: 12px;
}
</style>

</head>
<body>

<!-- 🎵 HAPPY BIRTHDAY MUSIC -->
<audio autoplay loop>
  <source src="happy-birthday.mp3" type="audio/mpeg">
</audio>

<!-- 🎈 Corner Image -->
<img src="img2.jpg" class="corner-img">

<h1>❤️ I Love You Ushna ❤️</h1>

<p class="premium">
May Allah always keep you happy and blessed ✨
</p>

<!-- 🎂 Center Image -->
<img src="img1.jpg" class="center-img">

<br><br>

<a href="page3.html">
  <button class="next-btn">Boston ➜ Next</button>
</a>

<!-- 🎆 Confetti Script -->
<script>
for (let i = 0; i < 30; i++) {
  let confetti = document.createElement("div");
  confetti.classList.add("confetti");
  document.body.appendChild(confetti);

  confetti.style.left = Math.random() * 100 + "vw";
  confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
  confetti.style.background = ["red","yellow","white","pink"][Math.floor(Math.random()*4)];
}
</script>

</body>
</html>
